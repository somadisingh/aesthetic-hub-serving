version: '3.8'

services:
  triton_server:
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - TRITONSERVER_GPU_MEM_FRACTION=0.9
    volumes:
      - ./models_triton:/models
      - ./workspace:/workspace
    command: ["tritonserver", "--model-repository=/models", "--strict-model-config=false", "--log-verbose=1"]
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  jupyter:
    image: jupyter/scipy-notebook:2024-03-04
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - AESTHETIC_DATA_DIR=/workspace/flickr-aes
    volumes:
      - ./workspace:/home/jovyan/work
      - ./models_triton:/home/jovyan/models_triton
      - ./workspace:/mnt
    ports:
      - "8888:8888"
    command: ["start-notebook.sh", "--NotebookApp.token=''"]
    depends_on:
      - triton_server
